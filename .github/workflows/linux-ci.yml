name: Linux CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    env:
      BOTAN_VERSION: 3.0.0
      LIBDISPATCH_REF: swift-6.2-RELEASE
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            libblocksruntime-dev \
            libbsd-dev \
            libgc-dev \
            make \
            ninja-build \
            pkg-config \
            python3 \
            systemtap-sdt-dev \
            xz-utils

      - name: Restore libdispatch cache
        id: cache-libdispatch
        uses: actions/cache@v4
        with:
          path: .ci-cache/libdispatch
          key: linux-libdispatch-ubuntu-24.04-${{ runner.arch }}-${{ env.LIBDISPATCH_REF }}-clang-shared-v1

      - name: Build libdispatch
        if: steps.cache-libdispatch.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci-cache/libdispatch
          git clone --depth 1 --branch "$LIBDISPATCH_REF" https://github.com/swiftlang/swift-corelibs-libdispatch.git .ci-cache/libdispatch/src
          cmake -S .ci-cache/libdispatch/src -B .ci-cache/libdispatch/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DBUILD_SHARED_LIBS=YES \
            -DENABLE_SWIFT=NO
          cmake --build .ci-cache/libdispatch/build

      - name: Install libdispatch
        run: |
          sudo cmake --install .ci-cache/libdispatch/build
          sudo ldconfig
          test -f /usr/local/include/dispatch/dispatch.h
          test -f /usr/local/lib/libdispatch.so
          echo "CIEL_LIBDISPATCH_INCLUDE_DIR=/usr/local/include" >> "$GITHUB_ENV"
          echo "CIEL_LIBDISPATCH_LIBRARY=/usr/local/lib/libdispatch.so" >> "$GITHUB_ENV"
          ldconfig -p | grep libdispatch

      - name: Restore Botan cache
        id: cache-botan
        uses: actions/cache@v4
        with:
          path: .ci-cache/botan
          key: linux-botan-ubuntu-24.04-${{ runner.arch }}-${{ env.BOTAN_VERSION }}-default-v1

      - name: Build Botan
        if: steps.cache-botan.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci-cache/botan
          curl -fsSLo "$RUNNER_TEMP/Botan-${BOTAN_VERSION}.tar.xz" "https://botan.randombit.net/releases/Botan-${BOTAN_VERSION}.tar.xz"
          tar -xf "$RUNNER_TEMP/Botan-${BOTAN_VERSION}.tar.xz" -C .ci-cache/botan --strip-components=1
          cd .ci-cache/botan
          python3 configure.py --prefix=/usr/local --without-documentation
          make -j"$(nproc)"

      - name: Install Botan
        run: |
          cd .ci-cache/botan
          sudo make install
          sudo ldconfig
          pkg-config --modversion botan-3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test
